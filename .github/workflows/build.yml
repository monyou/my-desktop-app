name: Build and Release Desktop Apps

on:
  push:
    branches:
      - release

jobs:
  release:
    name: Build Cross-Platform Targets
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Linux Build Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl

      - name: Setup Bun Runtime
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Project Dependencies
        run: bun install

      - name: Compile Svelte Frontend
        run: bun run build

      - name: Package Native Desktop Application
        run: bunx electrobun build --env=stable

      - name: Upload Binaries to Continuous Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Safely try to create the release base if it doesn't exist yet
          gh release create latest-build \
            --title "Continuous Build (Bleeding Edge)" \
            --notes "Automated build from the latest commit on the release branch." \
            --prerelease || true

          # 2. Upload the fresh assets, overwriting the old ones cleanly
          gh release upload latest-build artifacts/* --clobber
