name: Build Desktop Apps

on:
  push:
    branches: [release]

jobs:
  release:
    name: Build Cross-Platform Targets
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Linux environments require essential build tools and GTK/Webkit headers
      # so Electrobun can bind to the native desktop shell
      - name: Install Linux Build Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl

      - name: Setup Bun Runtime
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Project Dependencies
        run: bun install

      - name: Compile SvelteKit Frontend
        run: bun run build

      - name: Package Native Desktop Application
        run: bunx electrobun build --env=stable

      - name: Upload Binaries Direct to GitHub Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The 'gh release create' command gracefully creates the release if it doesn't exist,
          # or simply uploads new files to it if another OS runner already created it.
          gh release create ${{ github.ref_name }} artifacts/* \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            --clobber
